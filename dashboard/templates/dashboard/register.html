{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Creative Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'dashboard/style.css?v=2.2' %}">
    <link rel="stylesheet" href="{% static 'dashboard/auth.css' %}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h2>Mulai Perjalananmu!</h2>
            <p>Bergabunglah dengan ribuan pelajar lainnya.</p>

            {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for message in messages %}
                <div style="padding: 10px; border-radius: 8px; margin-bottom: 10px; color: white; background: {% if message.tags == 'error' %}rgba(255, 71, 87, 0.9){% else %}rgba(39, 174, 96, 0.9){% endif %}; text-align: left; font-size: 0.9rem;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="auth-form" method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="fullname" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="nama@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" placeholder="Buat password yang kuat" required>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Daftar Sekarang</button>
            </form>
            <div class="auth-footer">
                Sudah punya akun? <a href="{% url 'login' %}">Masuk di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
