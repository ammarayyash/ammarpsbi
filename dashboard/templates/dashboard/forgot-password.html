{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Creative Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'dashboard/style.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard/auth.css' %}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2>Lupa Password?</h2>
            <p>Masukkan email Anda untuk mereset password.</p>

            <form class="auth-form" method="POST" action="{% url 'forgot_password' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="nama@email.com" required>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Kirim Link Reset</button>
            </form>
            <div class="auth-footer">
                Kembali ke <a href="{% url 'login' %}">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
