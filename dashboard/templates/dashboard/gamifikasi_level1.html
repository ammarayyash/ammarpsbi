{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1 – The Vector Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--accent:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:#f0f0f5;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg span{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:fl 10s ease-in-out infinite alternate}
.bg span:nth-child(1){width:500px;height:500px;background:#4f46e5;top:-10%;left:-10%}
.bg span:nth-child(2){width:400px;height:400px;background:#7c3aed;bottom:-10%;right:-5%;animation-delay:3s}
.bg span:nth-child(3){width:300px;height:300px;background:#2563eb;top:40%;left:55%;animation-delay:6s}
@keyframes fl{to{transform:translate(30px,-20px) scale(1.1)}}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:24px 16px;min-height:100vh;display:flex;flex-direction:column}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.level-badge{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:6px 18px;border-radius:20px;font-weight:700;font-size:.85rem;letter-spacing:1px}
.score-disp{font-size:1.1rem;font-weight:700;color:var(--accent)}
.quit-btn{background:var(--card);border:1px solid var(--border);color:#fff;padding:8px 18px;border-radius:20px;font-family:inherit;font-size:.85rem;cursor:pointer;text-decoration:none;transition:.2s}
.quit-btn:hover{background:rgba(239,68,68,.3)}
/* progress */
.prog-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.prog-track{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#4f46e5,#818cf8);transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:.85rem;font-weight:600;white-space:nowrap}
/* question */
.q-area{text-align:center;margin-bottom:28px}
.q-ronde{font-size:.8rem;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:1.3rem;font-weight:700;line-height:1.5;animation:fadeUp .4s ease}
.q-text strong{color:#fbbf24}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* grid 3x4 */
.img-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;animation:fadeUp .4s ease}
.img-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:10px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.img-card:hover{transform:translateY(-4px) scale(1.03);border-color:var(--accent);box-shadow:0 8px 30px rgba(129,140,248,.25)}
.img-card svg{width:100%;height:100px;border-radius:8px}
.img-card .img-label{font-size:.7rem;opacity:.6;text-align:center}
.img-card.correct{border-color:var(--green)!important;box-shadow:0 0 20px rgba(34,197,94,.4)!important;animation:pulse-green .5s ease}
.img-card.wrong{border-color:var(--red)!important;box-shadow:0 0 20px rgba(239,68,68,.4)!important;animation:shake .4s ease}
@keyframes pulse-green{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
/* round 5 special */
.duo-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:600px;margin:0 auto;animation:fadeUp .4s ease}
.duo-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:.2s;text-align:center}
.duo-card:hover{border-color:var(--accent);transform:scale(1.02)}
.duo-card svg,.duo-card img{width:100%;height:220px;object-fit:cover;border-radius:10px}
.duo-card .duo-label{font-size:.9rem;font-weight:600;margin-top:10px;opacity:.8}
.duo-card.correct{border-color:var(--green);box-shadow:0 0 24px rgba(34,197,94,.4);animation:pulse-green .5s}
.duo-card.wrong{border-color:var(--red);animation:shake .4s}
/* feedback */
.feedback-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,40,.95);border:1px solid var(--border);border-radius:12px;padding:14px 28px;font-size:1rem;font-weight:600;transition:.4s;opacity:0;z-index:100}
.feedback-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.feedback-toast.green{border-color:var(--green);color:var(--green)}
.feedback-toast.red{border-color:var(--red);color:var(--red)}
/* result */
.result-screen{text-align:center;padding:40px 20px;animation:fadeUp .5s ease}
.result-icon{font-size:5rem;margin-bottom:16px}
.result-score{font-size:4rem;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.result-msg{font-size:1.1rem;opacity:.8;margin-bottom:32px}
.result-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;padding:14px 40px;border-radius:30px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
.result-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(79,70,229,.5)}
.hidden{display:none}
@media(max-width:600px){.img-grid{grid-template-columns:repeat(3,1fr)}.duo-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"><span></span><span></span><span></span></div>
<div class="wrap">
  <div class="topbar">
    <div class="level-badge">⚡ LEVEL 1</div>
    <div class="score-disp">Skor: <span id="scoreDisp">0</span>/100</div>
    <a href="{% url 'misi' %}" class="quit-btn"><i class="fa fa-xmark"></i> Keluar</a>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-text" id="progText">Ronde 1/5</div>
  </div>

  <!-- Question area -->
  <div class="q-area">
    <div class="q-ronde" id="qRonde">RONDE 1</div>
    <div class="q-text" id="qText"></div>
  </div>

  <!-- Normal 12-image grid (rounds 1-4) -->
  <div class="img-grid" id="imgGrid"></div>

  <!-- Special round 5: 2 large images -->
  <div class="duo-grid hidden" id="duoGrid">
    <div class="duo-card" id="duoFoto" onclick="answerDuo('foto')">
      <img src="/media/gamifikasi/foto_wajah.jpg" alt="Foto Wajah" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg style="display:none" viewBox="0 0 200 200"><circle cx="100" cy="80" r="50" fill="#a78bfa" opacity=".6"/><ellipse cx="100" cy="170" rx="70" ry="40" fill="#7c3aed" opacity=".5"/><circle cx="85" cy="72" r="6" fill="#1a1a3e"/><circle cx="115" cy="72" r="6" fill="#1a1a3e"/><path d="M85 95 Q100 108 115 95" stroke="#1a1a3e" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
      <div class="duo-label">📷 Foto Wajah</div>
    </div>
    <div class="duo-card" id="duoLogo" onclick="answerDuo('logo')">
      <img src="/media/gamifikasi/logo_vektor.png" alt="Logo Vektor" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg style="display:none" viewBox="0 0 200 200"><circle cx="100" cy="100" r="85" fill="none" stroke="#818cf8" stroke-width="8"/><polygon points="100,30 160,160 40,160" fill="none" stroke="#818cf8" stroke-width="6"/><circle cx="100" cy="100" r="25" fill="#4f46e5"/></svg>
      <div class="duo-label">🔷 Logo Vektor</div>
    </div>
  </div>

  <!-- Result screen -->
  <div class="result-screen hidden" id="resultScreen"></div>
</div>

<div class="feedback-toast" id="toast"></div>

<form id="scoreForm" method="POST" action="{% url 'gamifikasi_level1' %}">
  {% csrf_token %}
  <input type="hidden" name="score" id="scoreInput">
</form>

<script>
(function(){
const ROUNDS = [
  {q:"Klik gambar yang <strong>PALING EFEKTIF</strong> dibuat dalam format <strong>VEKTOR</strong>!", correct:0, hint:"Logo perusahaan butuh format vektor agar tetap tajam di semua ukuran."},
  {q:"Klik gambar yang <strong>PALING EFEKTIF</strong> dibuat dalam format <strong>VEKTOR</strong>!", correct:4, hint:"Ikon aplikasi perlu vektor agar scalable di semua resolusi layar."},
  {q:"Klik gambar yang <strong>PALING EFEKTIF</strong> dibuat dalam format <strong>VEKTOR</strong>!", correct:8, hint:"Tipografi dekoratif dibuat vektor agar bentuknya bisa dimanipulasi."},
  {q:"Klik gambar yang <strong>PALING EFEKTIF</strong> dibuat dalam format <strong>BITMAP</strong>!", correct:1, hint:"Foto wajah dengan gradasi kompleks paling cocok disimpan sebagai bitmap."},
];

const IMAGES = [
  {label:"Logo Perusahaan", svg:`<svg viewBox="0 0 120 100"><circle cx="60" cy="50" r="44" fill="#1e1b4b" stroke="#818cf8" stroke-width="4"/><polygon points="60,20 85,68 35,68" fill="#4f46e5"/><text x="60" y="78" text-anchor="middle" font-size="9" fill="#a5b4fc" font-family="sans-serif">BRAND</text></svg>`},
  {label:"Foto Wajah", svg:`<svg viewBox="0 0 120 100"><defs><filter id="n1"><feTurbulence type="turbulence" baseFrequency=".9" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/></filter></defs><rect width="120" height="100" fill="#c4a882"/><ellipse cx="60" cy="42" rx="28" ry="32" fill="#e8c9a0" filter="url(#n1)"/><ellipse cx="60" cy="95" rx="44" ry="22" fill="#b8956a"/><circle cx="50" cy="38" r="4" fill="#3a1f00"/><circle cx="70" cy="38" r="4" fill="#3a1f00"/><path d="M50 55 Q60 64 70 55" stroke="#a0522d" stroke-width="2" fill="none"/></svg>`},
  {label:"Ilustrasi Flat", svg:`<svg viewBox="0 0 120 100"><rect width="120" height="100" fill="#fef3c7"/><circle cx="60" cy="38" r="22" fill="#f59e0b"/><rect x="38" y="58" width="44" height="38" rx="6" fill="#10b981"/><rect x="28" y="62" width="16" height="30" rx="4" fill="#10b981"/><rect x="76" y="62" width="16" height="30" rx="4" fill="#10b981"/><circle cx="52" cy="34" r="3" fill="#1e293b"/><circle cx="68" cy="34" r="3" fill="#1e293b"/><path d="M52 46 Q60 53 68 46" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
  {label:"Foto Alam", svg:`<svg viewBox="0 0 120 100"><defs><linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient><filter id="n2"><feTurbulence baseFrequency=".05" numOctaves="3"/><feColorMatrix type="saturate" values="0.3"/></filter></defs><rect width="120" height="100" fill="url(#sky1)"/><ellipse cx="60" cy="75" rx="70" ry="45" fill="#22c55e" filter="url(#n2)"/><polygon points="30,65 55,20 80,65" fill="#15803d"/><polygon points="60,58 85,10 110,58" fill="#166534"/><circle cx="20" cy="18" r="12" fill="#fde68a" opacity=".9"/></svg>`},
  {label:"Ikon Aplikasi", svg:`<svg viewBox="0 0 120 100"><rect width="120" height="100" rx="14" fill="#0f172a"/><polygon points="60,18 80,62 40,62" fill="#818cf8"/><circle cx="60" cy="75" r="12" fill="#4f46e5"/><line x1="60" y1="63" x2="60" y2="75" stroke="#818cf8" stroke-width="3"/></svg>`},
  {label:"Foto Produk", svg:`<svg viewBox="0 0 120 100"><defs><radialGradient id="rg1" cx="35%" cy="30%"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#94a3b8"/></radialGradient><filter id="n3"><feTurbulence baseFrequency=".2" numOctaves="2" result="t"/><feComposite in="SourceGraphic" in2="t" operator="in"/></filter></defs><rect width="120" height="100" fill="#1e293b"/><ellipse cx="60" cy="50" rx="40" ry="40" fill="url(#rg1)"/><ellipse cx="48" cy="36" rx="12" ry="8" fill="white" opacity=".4"/></svg>`},
  {label:"Peta Kota", svg:`<svg viewBox="0 0 120 100"><rect width="120" height="100" fill="#e2e8f0"/><line x1="0" y1="25" x2="120" y2="25" stroke="#94a3b8" stroke-width="3"/><line x1="0" y1="50" x2="120" y2="50" stroke="#94a3b8" stroke-width="3"/><line x1="0" y1="75" x2="120" y2="75" stroke="#94a3b8" stroke-width="3"/><line x1="30" y1="0" x2="30" y2="100" stroke="#94a3b8" stroke-width="3"/><line x1="60" y1="0" x2="60" y2="100" stroke="#94a3b8" stroke-width="3"/><line x1="90" y1="0" x2="90" y2="100" stroke="#94a3b8" stroke-width="3"/><circle cx="60" cy="50" r="8" fill="#ef4444"/><line x1="60" y1="42" x2="60" y2="28" stroke="#ef4444" stroke-width="2"/></svg>`},
  {label:"Tekstur Batu", svg:`<svg viewBox="0 0 120 100"><defs><filter id="n4"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="8" stitchTiles="stitch" result="f"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" in2="f" mode="multiply"/></filter></defs><rect width="120" height="100" fill="#9ca3af" filter="url(#n4)"/><rect width="120" height="100" fill="#6b7280" filter="url(#n4)" opacity=".5"/></svg>`},
  {label:"Tipografi Deko", svg:`<svg viewBox="0 0 120 100"><rect width="120" height="100" fill="#0f172a"/><text x="60" y="68" text-anchor="middle" font-size="62" font-family="Georgia,serif" font-weight="bold" fill="#818cf8" letter-spacing="-2">A</text><line x1="15" y1="78" x2="105" y2="78" stroke="#4f46e5" stroke-width="3"/></svg>`},
  {label:"Foto Makanan", svg:`<svg viewBox="0 0 120 100"><defs><radialGradient id="rg2" cx="40%" cy="35%"><stop offset="0%" stop-color="#fde68a"/><stop offset="60%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></radialGradient><filter id="n5"><feTurbulence baseFrequency=".15" numOctaves="2"/><feColorMatrix type="saturate" values="1.5"/><feBlend in="SourceGraphic" mode="overlay" result="r"/></filter></defs><rect width="120" height="100" fill="#292524"/><circle cx="60" cy="50" r="38" fill="url(#rg2)" filter="url(#n5)"/><circle cx="60" cy="50" r="22" fill="#b45309" opacity=".7"/><circle cx="48" cy="42" rx="6" r="4" fill="#fde68a" opacity=".5"/></svg>`},
  {label:"Poster Vektor", svg:`<svg viewBox="0 0 120 100"><rect width="120" height="100" fill="#1e1b4b"/><polygon points="60,5 115,95 5,95" fill="none" stroke="#818cf8" stroke-width="3"/><polygon points="60,20 98,85 22,85" fill="#4f46e5" opacity=".6"/><circle cx="60" cy="52" r="18" fill="#a78bfa"/><text x="60" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="sans-serif">POSTER</text></svg>`},
  {label:"Foto Arsitektur", svg:`<svg viewBox="0 0 120 100"><defs><linearGradient id="lg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#7dd3fc"/></linearGradient><filter id="n6"><feTurbulence baseFrequency=".03" numOctaves="2"/><feBlend in="SourceGraphic" mode="soft-light"/></filter></defs><rect width="120" height="100" fill="url(#lg2)"/><rect x="5" y="40" width="110" height="60" fill="#374151" filter="url(#n6)"/><rect x="10" y="20" width="30" height="80" fill="#4b5563"/><rect x="50" y="30" width="20" height="70" fill="#6b7280"/><rect x="80" y="15" width="35" height="85" fill="#374151"/><rect x="15" y="50" width="8" height="12" fill="#93c5fd" opacity=".7"/><rect x="30" y="50" width="8" height="12" fill="#93c5fd" opacity=".7"/></svg>`},
];

let currentRound=0, score=0;

function setProgress(){
  const pct=(currentRound/5)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progText').textContent='Ronde '+(currentRound+1)+'/5';
  document.getElementById('qRonde').textContent='RONDE '+(currentRound+1);
}

function renderRound(){
  if(currentRound===4){renderRound5();return;}
  const r=ROUNDS[currentRound];
  document.getElementById('qText').innerHTML=r.q;
  document.getElementById('duoGrid').classList.add('hidden');
  const grid=document.getElementById('imgGrid');
  grid.classList.remove('hidden');
  grid.innerHTML='';
  IMAGES.forEach((img,i)=>{
    const card=document.createElement('div');
    card.className='img-card';
    card.innerHTML=img.svg+'<div class="img-label">'+img.label+'</div>';
    card.addEventListener('click',()=>answerGrid(i,card,r.correct,r.hint));
    grid.appendChild(card);
  });
  setProgress();
}

function answerGrid(idx,card,correct,hint){
  const cards=document.querySelectorAll('.img-card');
  cards.forEach(c=>c.style.pointerEvents='none');
  if(idx===correct){
    card.classList.add('correct');
    showToast('✅ Benar! '+hint,'green');
    score+=20;
    document.getElementById('scoreDisp').textContent=score;
    currentRound++;
    setTimeout(()=>{cards.forEach(c=>{c.style.pointerEvents='';c.classList.remove('correct','wrong')});if(currentRound<5)renderRound();else showResult();},1400);
  } else {
    card.classList.add('wrong');
    showToast('❌ Bukan itu! Coba lagi.','red');
    setTimeout(()=>{card.classList.remove('wrong');cards.forEach(c=>c.style.pointerEvents='');},900);
  }
}

function renderRound5(){
  document.getElementById('qText').innerHTML='Klik gambar yang <strong>TIDAK PECAH</strong> jika diperbesar <strong>1000%</strong>.';
  document.getElementById('qRonde').textContent='RONDE 5 – FINAL';
  document.getElementById('imgGrid').classList.add('hidden');
  document.getElementById('duoGrid').classList.remove('hidden');
  setProgress();
}

window.answerDuo=function(choice){
  document.getElementById('duoFoto').style.pointerEvents='none';
  document.getElementById('duoLogo').style.pointerEvents='none';
  if(choice==='logo'){
    document.getElementById('duoLogo').classList.add('correct');
    showToast('✅ Benar! Vektor tidak pecah saat diperbesar — berbasis matematika.','green');
    score+=20;
    document.getElementById('scoreDisp').textContent=score;
    currentRound++;
    setTimeout(showResult,1600);
  } else {
    document.getElementById('duoFoto').classList.add('wrong');
    showToast('❌ Foto akan pecah/blur saat diperbesar! Coba lagi.','red');
    setTimeout(()=>{
      document.getElementById('duoFoto').classList.remove('wrong');
      document.getElementById('duoFoto').style.pointerEvents='';
      document.getElementById('duoLogo').style.pointerEvents='';
    },900);
  }
};

function showResult(){
  document.getElementById('imgGrid').classList.add('hidden');
  document.getElementById('duoGrid').classList.add('hidden');
  document.getElementById('qArea') && (document.getElementById('qArea').style.display='none');
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progText').textContent='Selesai!';
  const pass=score>=60;
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('resultScreen').innerHTML=`
    <div class="result-icon">${pass?'🏆':'💪'}</div>
    <div class="result-score">${score}/100</div>
    <div class="result-msg">${pass?'Luar biasa! Kamu memahami perbedaan vektor dan bitmap.':'Hampir! Pelajari kembali materi dan coba lagi.'}</div>
    <button class="result-btn" onclick="submitScore()">
      ${pass?'<i class="fa fa-arrow-right"></i> Lanjut':'<i class="fa fa-redo"></i> Coba Lagi'}
    </button>`;
}

window.submitScore=function(){
  document.getElementById('scoreInput').value=score;
  document.getElementById('scoreForm').submit();
};

let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent='';
  t.className='feedback-toast '+type;
  t.innerHTML=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

renderRound();
})();
</script>
</body>
</html>
