{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis - {{ mission.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --quiz-bg: #0d0620;
            --quiz-bg-2: #1a0a3e;
            --card-bg: rgba(255,255,255,0.06);
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --option-red: #e74c3c;
            --option-blue: #3498db;
            --option-yellow: #f39c12;
            --option-green: #2ecc71;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--quiz-bg);
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ---- Animated background ---- */
        .bg-shapes {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .bg-shapes span {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .35;
            animation: float 8s ease-in-out infinite alternate;
        }
        .bg-shapes span:nth-child(1){ width:420px;height:420px;background:#6c5ce7;top:-10%;left:-5%;animation-delay:0s; }
        .bg-shapes span:nth-child(2){ width:350px;height:350px;background:#e17055;bottom:-10%;right:-8%;animation-delay:2s; }
        .bg-shapes span:nth-child(3){ width:280px;height:280px;background:#00cec9;top:40%;left:50%;animation-delay:4s; }
        @keyframes float {
            to { transform: translate(40px, -30px) scale(1.08); }
        }

        /* ---- Layout ---- */
        .quiz-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 900px;
            margin: 0 auto; padding: 24px 20px;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* ---- Top bar ---- */
        .quiz-topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
        }
        .quiz-topbar .mission-title {
            font-size: .95rem; font-weight: 500; opacity: .7;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
        }
        .quiz-topbar .quit-btn {
            background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
            color: white; padding: 8px 18px; border-radius: 30px;
            font-family: inherit; font-size: .85rem; cursor: pointer;
            transition: .2s; text-decoration: none;
        }
        .quiz-topbar .quit-btn:hover { background: rgba(231,76,60,.3); border-color: rgba(231,76,60,.5); }

        /* ---- Progress bar ---- */
        .progress-wrap {
            display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
        }
        .progress-track {
            flex: 1; height: 10px; background: rgba(255,255,255,.1);
            border-radius: 20px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 20px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            transition: width .5s cubic-bezier(.4,0,.2,1);
        }
        .progress-text { font-size: .85rem; font-weight: 600; white-space: nowrap; }

        /* ---- Timer ---- */
        .timer-ring-wrap {
            display: flex; align-items: center; gap: 10px;
        }
        .timer-ring {
            width: 48px; height: 48px; position: relative;
        }
        .timer-ring svg { transform: rotate(-90deg); }
        .timer-ring circle {
            fill: none; stroke-width: 4; cx: 24; cy: 24; r: 20;
        }
        .timer-ring .track { stroke: rgba(255,255,255,.1); }
        .timer-ring .fill {
            stroke: #a29bfe; stroke-linecap: round;
            stroke-dasharray: 125.66; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke .3s;
        }
        .timer-ring .fill.warning { stroke: #f39c12; }
        .timer-ring .fill.danger { stroke: #e74c3c; }
        .timer-text {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: .85rem; font-weight: 700;
        }

        /* ---- Question card ---- */
        .question-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
        }
        .question-number {
            font-size: .9rem; font-weight: 600; color: #a29bfe;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
        }
        .question-text {
            font-size: 1.6rem; font-weight: 700; line-height: 1.4;
            margin-bottom: 32px;
            animation: fadeSlideUp .4s ease-out;
        }

        /* ---- Options grid (2x2 like Quizizz) ---- */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
            animation: fadeSlideUp .45s ease-out;
        }
        .option-btn {
            position: relative;
            padding: 22px 24px;
            border-radius: 16px;
            border: 2.5px solid transparent;
            font-family: inherit; font-size: 1.05rem; font-weight: 600;
            color: white; cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: transform .15s, box-shadow .2s, border-color .2s, opacity .3s;
            overflow: hidden;
            min-height: 80px;
        }
        .option-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: inherit; opacity: .18;
            border-radius: inherit;
        }
        .option-btn .option-shape {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
            background: rgba(255,255,255,.2);
        }
        .option-btn .option-text { position: relative; z-index: 1; text-align: left; }

        .option-btn:nth-child(1) { background: var(--option-red); }
        .option-btn:nth-child(2) { background: var(--option-blue); }
        .option-btn:nth-child(3) { background: var(--option-yellow); }
        .option-btn:nth-child(4) { background: var(--option-green); }

        .option-btn:hover:not(.disabled) {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(0,0,0,.3);
        }
        .option-btn:active:not(.disabled) { transform: scale(.97); }

        /* States after answer */
        .option-btn.disabled { cursor: default; pointer-events: none; }
        .option-btn.selected-correct {
            border-color: var(--correct); box-shadow: 0 0 25px rgba(46,204,113,.4);
            animation: popCorrect .4s ease-out;
        }
        .option-btn.selected-wrong {
            border-color: var(--wrong); box-shadow: 0 0 25px rgba(231,76,60,.4);
            animation: shake .4s ease-out; opacity: .7;
        }
        .option-btn.reveal-correct {
            border-color: var(--correct); opacity: 1 !important;
        }
        .option-btn.fade-out { opacity: .35; }

        @keyframes popCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
        }

        /* ---- Feedback overlay ---- */
        .feedback-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
        }
        .feedback-overlay.show { display: flex; }
        .feedback-card {
            text-align: center; padding: 48px 40px;
            border-radius: 24px;
            animation: zoomIn .35s ease-out;
        }
        .feedback-card.correct { background: linear-gradient(135deg, #1a3a2a, #0d2818); border: 2px solid rgba(46,204,113,.4); }
        .feedback-card.wrong { background: linear-gradient(135deg, #3a1a1a, #280d0d); border: 2px solid rgba(231,76,60,.4); }
        .feedback-icon { font-size: 64px; margin-bottom: 16px; }
        .feedback-card.correct .feedback-icon { color: var(--correct); }
        .feedback-card.wrong .feedback-icon { color: var(--wrong); }
        .feedback-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
        .feedback-sub { font-size: 1rem; opacity: .7; }

        @keyframes zoomIn {
            from { transform: scale(.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---- Score footer ---- */
        .quiz-footer {
            display: flex; justify-content: center; gap: 32px;
            padding: 20px 0 12px; margin-top: auto;
        }
        .score-item { text-align: center; }
        .score-item .score-val {
            font-size: 1.4rem; font-weight: 800;
        }
        .score-item .score-label { font-size: .75rem; opacity: .5; text-transform: uppercase; letter-spacing: 1px; }
        .score-correct .score-val { color: var(--correct); }
        .score-wrong .score-val { color: var(--wrong); }
        .score-xp .score-val { color: #f1c40f; }

        /* ---- Streak banner ---- */
        .streak-banner {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 28px; border-radius: 30px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            font-weight: 700; font-size: 1rem;
            z-index: 50;
            animation: streakPop .5s ease-out forwards, streakFade .4s ease-in 1.5s forwards;
            pointer-events: none;
        }
        @keyframes streakPop { from { transform: translateX(-50%) scale(.5); opacity:0; } to { transform: translateX(-50%) scale(1); opacity:1; } }
        @keyframes streakFade { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

        /* ---- Confetti ---- */
        .confetti-piece {
            position: fixed; z-index: 200; pointer-events: none;
            width: 10px; height: 10px; border-radius: 2px;
        }

        /* ---- Hidden form ---- */
        .hidden-form { display: none; }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 1.25rem; }
            .option-btn { padding: 18px 18px; min-height: 64px; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <span></span><span></span><span></span>
    </div>

    <div class="quiz-container">
        <!-- Top bar -->
        <div class="quiz-topbar">
            <span class="mission-title"><i class="fa-solid fa-bezier-curve"></i> {{ mission.title }}</span>
            <div class="timer-ring-wrap">
                <div class="timer-ring">
                    <svg width="48" height="48"><circle class="track" /><circle class="fill" id="timerCircle" /></svg>
                    <div class="timer-text" id="timerText">30</div>
                </div>
            </div>
            <a href="{% url 'misi' %}" class="quit-btn"><i class="fa-solid fa-xmark"></i> Keluar</a>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">1 / {{ questions|length }}</div>
        </div>

        <!-- Question area -->
        <div class="question-area">
            <div class="question-number" id="qNumber">SOAL 1</div>
            <div class="question-text" id="qText"></div>

            <div class="options-grid" id="optionsGrid"></div>
        </div>

        <!-- Score footer -->
        <div class="quiz-footer">
            <div class="score-item score-correct">
                <div class="score-val" id="scoreCorrect">0</div>
                <div class="score-label">Benar</div>
            </div>
            <div class="score-item score-xp">
                <div class="score-val" id="scoreXP">0</div>
                <div class="score-label">XP</div>
            </div>
            <div class="score-item score-wrong">
                <div class="score-val" id="scoreWrong">0</div>
                <div class="score-label">Salah</div>
            </div>
        </div>
    </div>

    <!-- Feedback overlay -->
    <div class="feedback-overlay" id="feedbackOverlay">
        <div class="feedback-card" id="feedbackCard">
            <div class="feedback-icon" id="feedbackIcon"></div>
            <div class="feedback-title" id="feedbackTitle"></div>
            <div class="feedback-sub" id="feedbackSub"></div>
        </div>
    </div>

    <!-- Hidden form for submission -->
    <form method="post" class="hidden-form" id="quizForm">
        {% csrf_token %}
        <div id="hiddenInputs"></div>
    </form>

    <script>
    (function() {
        // ---- Build questions data from Django template ----
        const questions = [
            {% for question in questions %}
            {
                id: {{ question.id }},
                text: "{{ question.text|escapejs }}",
                choices: [
                    {% for choice in question.choices.all %}
                    { id: {{ choice.id }}, text: "{{ choice.text|escapejs }}" },
                    {% endfor %}
                ]
            },
            {% endfor %}
        ];

        const SHAPES = [
            '<i class="fa-solid fa-diamond"></i>',
            '<i class="fa-solid fa-circle"></i>',
            '<i class="fa-solid fa-square"></i>',
            '<i class="fa-solid fa-play"></i>'
        ];

        const TIMER_DURATION = 30;
        const CIRCUMFERENCE = 2 * Math.PI * 20; // r=20
        let currentQ = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let streak = 0;
        let answers = {}; // questionId -> choiceId
        let timerInterval = null;
        let timeLeft = TIMER_DURATION;

        // DOM refs
        const qNumber = document.getElementById('qNumber');
        const qText = document.getElementById('qText');
        const optionsGrid = document.getElementById('optionsGrid');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const timerText = document.getElementById('timerText');
        const timerCircle = document.getElementById('timerCircle');
        const scoreCorrect = document.getElementById('scoreCorrect');
        const scoreWrong = document.getElementById('scoreWrong');
        const scoreXP = document.getElementById('scoreXP');
        const feedbackOverlay = document.getElementById('feedbackOverlay');
        const feedbackCard = document.getElementById('feedbackCard');
        const feedbackIcon = document.getElementById('feedbackIcon');
        const feedbackTitle = document.getElementById('feedbackTitle');
        const feedbackSub = document.getElementById('feedbackSub');

        function renderQuestion() {
            const q = questions[currentQ];
            qNumber.textContent = 'SOAL ' + (currentQ + 1);
            qText.textContent = q.text;

            // Animate
            qText.style.animation = 'none';
            qText.offsetHeight; // reflow
            qText.style.animation = 'fadeSlideUp .4s ease-out';

            optionsGrid.innerHTML = '';
            optionsGrid.style.animation = 'none';
            optionsGrid.offsetHeight;
            optionsGrid.style.animation = 'fadeSlideUp .45s ease-out';

            q.choices.forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.type = 'button';
                btn.innerHTML = '<div class="option-shape">' + SHAPES[i] + '</div><span class="option-text">' + c.text + '</span>';
                btn.addEventListener('click', () => selectAnswer(c.id, btn));
                optionsGrid.appendChild(btn);
            });

            // Progress
            progressFill.style.width = ((currentQ) / questions.length * 100) + '%';
            progressText.textContent = (currentQ + 1) + ' / ' + questions.length;

            // Reset timer
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = TIMER_DURATION;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Time's up — auto skip (count as wrong)
                    autoSkip();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            timerText.textContent = timeLeft;
            const offset = CIRCUMFERENCE * (1 - timeLeft / TIMER_DURATION);
            timerCircle.style.strokeDasharray = CIRCUMFERENCE;
            timerCircle.style.strokeDashoffset = offset;

            timerCircle.classList.remove('warning', 'danger');
            if (timeLeft <= 5) timerCircle.classList.add('danger');
            else if (timeLeft <= 10) timerCircle.classList.add('warning');
        }

        function autoSkip() {
            wrongCount++;
            streak = 0;
            scoreWrong.textContent = wrongCount;
            showFeedback(false, 'Waktu Habis!');
        }

        function selectAnswer(choiceId, btnEl) {
            clearInterval(timerInterval);

            // Disable all buttons
            const allBtns = optionsGrid.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.classList.add('disabled'));

            // Store answer
            const q = questions[currentQ];
            answers[q.id] = choiceId;

            // We don't know correct answer on client side, so we'll submit
            // and show generic feedback. For the Quizizz feel we do a quick 
            // visual then move on. The actual correctness is checked server-side.
            // But to make it feel like Quizizz, let's assume we show a "selected" state
            // and move to next after a brief pause.
            
            btnEl.style.transform = 'scale(1.04)';
            btnEl.style.boxShadow = '0 0 30px rgba(255,255,255,.3)';
            btnEl.style.borderColor = 'rgba(255,255,255,.6)';

            // Fade others
            allBtns.forEach(b => {
                if (b !== btnEl) b.classList.add('fade-out');
            });

            setTimeout(() => {
                advanceQuestion();
            }, 600);
        }

        function showFeedback(isCorrect, customTitle) {
            feedbackCard.className = 'feedback-card ' + (isCorrect ? 'correct' : 'wrong');
            feedbackIcon.innerHTML = isCorrect
                ? '<i class="fa-solid fa-circle-check"></i>'
                : '<i class="fa-solid fa-circle-xmark"></i>';
            feedbackTitle.textContent = customTitle || (isCorrect ? 'Benar!' : 'Salah!');
            feedbackSub.textContent = isCorrect ? '+' + {{ mission.xp_reward }} / questions.length + ' XP' : 'Jangan menyerah!';
            feedbackOverlay.classList.add('show');

            setTimeout(() => {
                feedbackOverlay.classList.remove('show');
                advanceQuestion();
            }, 1200);
        }

        function advanceQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                renderQuestion();
            } else {
                submitQuiz();
            }
        }

        function submitQuiz() {
            // Fill hidden form
            const hiddenInputs = document.getElementById('hiddenInputs');
            hiddenInputs.innerHTML = '';
            for (const [qId, cId] of Object.entries(answers)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'question_' + qId;
                input.value = cId;
                hiddenInputs.appendChild(input);
            }

            // Update progress bar to 100%
            progressFill.style.width = '100%';
            progressText.textContent = questions.length + ' / ' + questions.length;

            // Brief pause then submit
            qText.textContent = 'Mengirim jawaban...';
            qNumber.textContent = 'SELESAI';
            optionsGrid.innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;"><i class="fa-solid fa-spinner fa-spin" style="font-size:2.5rem;color:#a29bfe;"></i></div>';

            setTimeout(() => {
                document.getElementById('quizForm').submit();
            }, 1000);
        }

        // ---- Streak banner ----
        function showStreak(count) {
            if (count < 2) return;
            const banner = document.createElement('div');
            banner.className = 'streak-banner';
            banner.innerHTML = '<i class="fa-solid fa-fire"></i> ' + count + 'x Streak!';
            document.body.appendChild(banner);
            setTimeout(() => banner.remove(), 2200);
        }

        // ---- Confetti ----
        function spawnConfetti() {
            const colors = ['#6c5ce7','#a29bfe','#ffeaa7','#55efc4','#fd79a8','#74b9ff'];
            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = (Math.random() * 100) + 'vw';
                piece.style.top = '-10px';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (6 + Math.random() * 8) + 'px';
                piece.style.height = (6 + Math.random() * 8) + 'px';
                piece.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
                piece.style.animation = 'confettiFall ' + (1.5 + Math.random() * 2) + 's linear forwards';
                piece.style.animationDelay = (Math.random() * .5) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // Add confetti keyframes dynamically
        const confettiStyle = document.createElement('style');
        confettiStyle.textContent = `
            @keyframes confettiFall {
                0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
            }
        `;
        document.head.appendChild(confettiStyle);

        // ---- Init ----
        if (questions.length > 0) {
            renderQuestion();
        }
    })();
    </script>
</body>
</html>
